<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAP Simulator - Sz & Wbl Final Fix</title>
    <style>
        :root { --pulpit: #a0a0a0; --bg: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #000; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; display: flex; justify-content: center; min-height: 100vh; }
        .pulpit { background: var(--pulpit); padding: 10px; border: 3px solid #333; border-radius: 4px; width: 100%; max-width: 1280px; box-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; margin: auto; }
        @media (max-width: 768px) { .pulpit { zoom: 0.6; } }
        .track-layout { height: 140px; border-bottom: 3px solid #222; position: relative; margin-bottom: 15px; background: #999; overflow: hidden; }
        #train { position: absolute; bottom: 5px; font-size: 35px; z-index: 5; display: none; filter: drop-shadow(2px 2px 2px #000); }
        .signal-box { position: absolute; bottom: 45px; width: 60px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .sig-label { font-size: 9px; font-weight: bold; background: #eee; padding: 1px 3px; border: 1px solid #000; margin-bottom: 2px; text-align: center; width: 100%; }
        .signal { width: 16px; height: 45px; background: #000; border-radius: 4px 4px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 2px 0; border: 1px solid #333; }
        .light { width: 9px; height: 9px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .light.red { background: #f00; box-shadow: 0 0 10px #f00; }
        .light.green { background: #0f0; box-shadow: 0 0 10px #0f0; }
        .light.white { background: #fff; box-shadow: 0 0 10px #fff; }
        #btn-go { display: none; position: absolute; top: 110px; left: 50%; transform: translateX(-50%); padding: 10px 25px; font-size: 16px; font-weight: bold; color: white; background: #228b22; border: 3px solid #1a5e1a; border-radius: 8px; cursor: pointer; z-index: 100; }
        .eap-display { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; background: #777; padding: 10px; border: 3px inset #555; }
        .station-arrows { display: flex; gap: 8px; align-items: center; background: #444; padding: 8px 15px; border-radius: 5px; }
        .arrow-shape { position: relative; width: 70px; height: 22px; background: #2a2a2a; display: flex; align-items: center; padding: 0 5px; gap: 3px; }
        .arrow-right { clip-path: polygon(0% 20%, 70% 20%, 70% 0%, 100% 50%, 70% 100%, 70% 80%, 0% 80%); }
        .arrow-left { clip-path: polygon(100% 20%, 30% 20%, 30% 0%, 0% 50%, 30% 100%, 30% 80%, 100% 80%); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #111; }
        .dot.white { background: #fff; box-shadow: 0 0 8px #fff; }
        .dot.red { background: #f00; box-shadow: 0 0 8px #f00; }
        .blink { animation: blinker 0.7s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } }
        .controls { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 300px; background: #b0b0b0; padding: 12px; border: 1px solid #777; border-radius: 5px; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .btn-unit { display: flex; flex-direction: column; align-items: center; text-align: center; min-width: 45px; }
        .label { font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        .counter { font-family: 'Courier New', monospace; font-size: 9px; background: #000; color: #f00; padding: 1px 3px; border: 1px solid #444; margin-bottom: 2px; min-width: 25px; }
        .btn-round { width: 36px; height: 36px; border-radius: 50%; background: #222; border: 3px solid #111; cursor: pointer; position: relative; }
        .btn-round:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-round::after { content: ''; position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; background: radial-gradient(circle, #666, #111); border-radius: 50%; }
        .lamp-dioda { width: 12px; height: 12px; border-radius: 50%; background: #333; border: 1px solid #000; margin-bottom: 3px; }
        .lamp-dioda.blue { background: #00bfff; box-shadow: 0 0 12px #00bfff; }
        #log { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 8px; margin-top: 10px; height: 35px; border-left: 5px solid #0f0; overflow: hidden; font-size: 11px; width: 100%; }
        .footer-controls { display: flex; justify-content: flex-end; margin-top: 10px; gap: 10px; }
        .btn-footer { padding: 6px 15px; color: white; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 2px solid rgba(0,0,0,0.3); }
        .btn-reset { background: #8b0000; }
        .btn-undo { background: #444; }
        .btn-footer:hover { filter: brightness(1.2); }
        .btn-footer:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="pulpit">
    <button id="btn-go" onclick="resumeTrain()">Ruszaj 🚂</button>
    <div class="track-layout">
        <div class="signal-box" style="left: 10px;"><span class="sig-label">WyA</span><div class="signal"><div id="L_WyA_G" class="light"></div><div id="L_WyA_R" class="light red"></div><div id="L_WyA_W" class="light"></div></div></div>
        <div class="signal-box" style="left: 120px;"><span class="sig-label">WjP</span><div class="signal"><div id="L_WjA_G" class="light"></div><div id="L_WjA_R" class="light red"></div><div id="L_WjA_W" class="light"></div></div></div>
        <div id="train">🚂</div>
        <div class="signal-box" style="right: 120px;"><span class="sig-label">WjA</span><div class="signal"><div id="L_WjB_G" class="light"></div><div id="L_WjB_R" class="light red"></div><div id="L_WjB_W" class="light"></div></div></div>
        <div class="signal-box" style="right: 10px;"><span class="sig-label">WyB</span><div class="signal"><div id="L_WyB_G" class="light"></div><div id="L_WyB_R" class="light red"></div><div id="L_WyB_W" class="light"></div></div></div>
    </div>
    <div class="eap-display">
        <div class="station-arrows">
            <div id="arr_A_right" class="arrow-shape arrow-right"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div id="arr_A_left" class="arrow-shape arrow-left"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div class="station-arrows">
            <div id="arr_B_right" class="arrow-shape arrow-right"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div id="arr_B_left" class="arrow-shape arrow-left"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
    </div>
    <div class="controls">
        <div class="panel">
            <div class="row">
                <div class="btn-unit"><span class="label">dKo</span><div id="cnt_dKo_A" class="counter">000</div><button id="B_A_dKo" class="btn-round" onclick="emergency('dKo','A')"></button></div>
                <div class="btn-unit"><span class="label">dPo</span><div id="cnt_dPo_A" class="counter">000</div><button id="B_A_dPo" class="btn-round" onclick="emergency('dPo','A')"></button></div>
                <div class="btn-unit"><span class="label">Poz</span><button id="B_A_Poz" class="btn-round" onclick="op('Poz','A')"></button></div>
                <div class="btn-unit" style="margin-left:15px"><span class="label">Wyjazd</span><button id="B_A_Wyj" class="btn-round" onclick="op('Wyj','A')"></button></div>
                <div class="btn-unit"><span class="label">Wjazd</span><button id="B_A_Wj" class="btn-round" onclick="op('Wj','A')"></button></div>
                <div class="btn-unit"><span class="label">Sz</span><div id="cnt_Sz_A" class="counter">000</div><button id="B_A_Sz" class="btn-round" onclick="useSz('A')"></button></div>
            </div>
            <div class="row" style="padding-left: 10px;">
                <div class="btn-unit"><div id="K_A" class="lamp-dioda"></div><button id="B_A_Blk" class="btn-round" onclick="op('Blk','A')"></button><span class="label">KoP</span></div>
                <div class="btn-unit" style="margin-left:35px"><button id="B_A_Wbl" class="btn-round" onclick="op('Wbl','A')"></button><span class="label">Wbl</span></div>
            </div>
        </div>
        <div class="panel">
            <div class="row">
                <div class="btn-unit"><span class="label">Poz</span><button id="B_B_Poz" class="btn-round" onclick="op('Poz','B')"></button></div>
                <div class="btn-unit"><span class="label">dPo</span><div id="cnt_dPo_B" class="counter">000</div><button id="B_B_dPo" class="btn-round" onclick="emergency('dPo','B')"></button></div>
                <div class="btn-unit"><span class="label">dKo</span><div id="cnt_dKo_B" class="counter">000</div><button id="B_B_dKo" class="btn-round" onclick="emergency('dKo','B')"></button></div>
                <div class="btn-unit" style="margin-left:15px"><span class="label">Wjazd</span><button id="B_B_Wj" class="btn-round" onclick="op('Wj','B')"></button></div>
                <div class="btn-unit"><span class="label">Wyjazd</span><button id="B_B_Wyj" class="btn-round" onclick="op('Wyj','B')"></button></div>
                <div class="btn-unit"><span class="label">Sz</span><div id="cnt_Sz_B" class="counter">000</div><button id="B_B_Sz" class="btn-round" onclick="useSz('B')"></button></div>
            </div>
            <div class="row">
                <div class="btn-unit"><button id="B_B_Wbl" class="btn-round" onclick="op('Wbl','B')"></button><span class="label">Wbl</span></div>
                <div class="btn-unit" style="margin-left:35px"><div id="K_B" class="lamp-dioda"></div><button id="B_B_Blk" class="btn-round" onclick="op('Blk','B')"></button><span class="label">KoA</span></div>
            </div>
        </div>
    </div>
    <div id="log">> SYSTEM GOTOWY.</div>
    <div class="footer-controls">
        <button id="btn-undo" class="btn-footer btn-undo" onclick="undo()" disabled>Cofnij</button>
        <button class="btn-footer btn-reset" onclick="resetSystem()">Reset</button>
    </div>
</div>

<script>
    const S = { IDLE:0, REQ:1, PERM:2, CANCEL:9, PAUSE:8, PWL:3, LINE:4, ENTRY:5, IN:6, ARR:7, EMERG_SZ_OUT: 11, STUCK_DPO: 12 };
    let state = S.IDLE, dir = null, moveInterval = null, prevState = S.IDLE;
    let dKoActive = { A: false, B: false };
    let dPoUsed = false;
    let szUsedForEntry = false;
    let szUsedForExit = false;
    let counters = { dKo_A:0, dPo_A:0, Sz_A:0, dKo_B:0, dPo_B:0, Sz_B:0 };
    let history = [];

    function msg(t) { document.getElementById('log').innerText = "> " + t.toUpperCase(); }

    function saveState() {
        const snapshot = {
            state, dir, dPoUsed, szUsedForEntry, szUsedForExit, prevState,
            dKoActive: JSON.parse(JSON.stringify(dKoActive)),
            counters: JSON.parse(JSON.stringify(counters)),
            log: document.getElementById('log').innerText,
            trainPos: document.getElementById('train').style.left,
            trainDisplay: document.getElementById('train').style.display,
            signals: Array.from(document.querySelectorAll('.light')).map(l => ({id: l.id, className: l.className}))
        };
        history.push(snapshot);
        if (history.length > 30) history.shift();
        document.getElementById('btn-undo').disabled = false;
    }

    function undo() {
        if (history.length === 0) return;
        if(moveInterval) clearInterval(moveInterval);
        const prev = history.pop();
        state = prev.state; dir = prev.dir; dPoUsed = prev.dPoUsed; prevState = prev.prevState;
        szUsedForEntry = prev.szUsedForEntry; szUsedForExit = prev.szUsedForExit;
        dKoActive = prev.dKoActive; counters = prev.counters;
        document.getElementById('log').innerText = prev.log;
        Object.keys(counters).forEach(k => {
            const el = document.getElementById(`cnt_${k}`);
            if(el) el.innerText = String(counters[k]).padStart(3, '0');
        });
        const t = document.getElementById('train');
        t.style.left = prev.trainPos; t.style.display = prev.trainDisplay;
        prev.signals.forEach(s => {
            const el = document.getElementById(s.id);
            if(el) el.className = s.className;
        });
        if (history.length === 0) document.getElementById('btn-undo').disabled = true;
        updateVisuals();
    }

    function increment(type, st) {
        const key = `${type}_${st}`;
        counters[key]++;
        const el = document.getElementById(`cnt_${key}`);
        if(el) el.innerText = String(counters[key]).padStart(3, '0');
    }

    function updateVisuals() {
        document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
        const side = dir === 'A' ? 'right' : 'left', destSt = dir === 'A' ? 'B' : 'A';
        
        document.querySelectorAll('.btn-round').forEach(b => b.disabled = true);
        document.getElementById('B_A_Sz').disabled = false;
        document.getElementById('B_B_Sz').disabled = false;

        // Logika strzałek
        if (state === S.REQ) {
            setDots(`arr_A_${side}`, 'white blink'); setDots(`arr_B_${side}`, 'white blink');
            document.getElementById('B_' + dir + '_Wbl').disabled = false;
            document.getElementById(dir === 'A' ? 'B_B_Poz' : 'B_A_Poz').disabled = false;
        } 
        else if (state === S.PERM || (state === S.EMERG_SZ_OUT && !dPoUsed && prevState === S.PERM)) {
            setDots(`arr_A_${side}`, 'white'); setDots(`arr_B_${side}`, 'white');
            if(state === S.PERM) document.getElementById('B_' + dir + '_Wyj').disabled = false;
            document.getElementById('B_' + dir + '_Wbl').disabled = false;
            document.getElementById('B_' + dir + '_dPo').disabled = false;
        }
        else if (state === S.CANCEL) {
            setDots(`arr_A_${side}`, 'white blink'); setDots(`arr_B_${side}`, 'white blink');
            document.getElementById('B_' + destSt + '_Wbl').disabled = false;
        }
        else if (state >= S.PWL && state <= S.ARR) {
            setDots(`arr_A_${side}`, 'red'); setDots(`arr_B_${side}`, 'red');
            if (state === S.ENTRY) document.getElementById('B_' + destSt + '_Wj').disabled = false;
            document.getElementById('B_' + destSt + '_dKo').disabled = false;
        }
        else if (state === S.PAUSE || (state === S.STUCK_DPO && !dPoUsed)) {
            setDots(`arr_${dir}_${side}`, 'red'); setDots(`arr_${destSt}_${side}`, 'red blink');
            document.getElementById('B_' + dir + '_dPo').disabled = false;
        }
        else if (state === S.IDLE) {
            document.getElementById('B_A_Wbl').disabled = false;
            document.getElementById('B_B_Wbl').disabled = false;
        }

        // dPo ZAWSZE wymusza czerwony
        if (dPoUsed && dir) {
            setDots(`arr_A_${side}`, 'red'); setDots(`arr_B_${side}`, 'red');
            document.getElementById('B_' + dir + '_dPo').disabled = false;
        }

        let showKoLamp = (state === S.ARR && !szUsedForEntry) || (state === S.ARR && szUsedForEntry && dKoActive[destSt]);
        document.getElementById('K_A').className = (dKoActive.A || (dir === 'B' && showKoLamp)) ? 'lamp-dioda blue' : 'lamp-dioda';
        document.getElementById('K_B').className = (dKoActive.B || (dir === 'A' && showKoLamp)) ? 'lamp-dioda blue' : 'lamp-dioda';
        
        if (state === S.ARR && dir) {
            document.getElementById('B_' + (dir === 'A' ? 'B' : 'A') + '_Blk').disabled = !showKoLamp;
        }

        document.getElementById('btn-go').style.display = (state === S.PAUSE || state === S.EMERG_SZ_OUT || state === S.IN || state === S.STUCK_DPO) ? 'block' : 'none';
    }

    function setDots(id, c) { 
        const el = document.getElementById(id);
        if(el) el.querySelectorAll('.dot').forEach(d => d.className = 'dot ' + c); 
    }

    function useSz(st) {
        saveState();
        increment('Sz', st);
        if ((state === S.IDLE || state === S.PERM || state === S.PAUSE) && (dir === st || dir === null)) {
            prevState = state;
            if(dir === null) dir = st;
            szUsedForExit = true;
            state = S.EMERG_SZ_OUT; setSig(st, 'Wy', 'white-blink'); setupTrain(); msg("SZ WYJAZDOWY.");
        } else if ((state === S.ENTRY || state === S.ARR) && ((dir === 'A' && st === 'B') || (dir === 'B' && st === 'A'))) {
            szUsedForEntry = true;
            setSig(st, 'Wj', 'white-blink'); 
            if (state === S.ENTRY) state = S.IN; 
            msg("SZ WJAZDOWY.");
        }
        updateVisuals();
    }

    function op(type, st) {
        saveState();
        if (type === 'Wbl') {
            if (state === S.IDLE) { state = S.REQ; dir = st; msg("ŻĄDANIE ZGODY."); }
            else if (state === S.REQ && dir === st) { state = S.IDLE; dir = null; msg("WYCOFANIE ŻĄDANIA."); }
            else if (state === S.PERM && dir === st) { state = S.CANCEL; msg("INICJACJA ZWROTU ZGODY."); }
            else if (state === S.CANCEL && dir !== st) { resetSystem(); msg("ZWROT PRZYJĘTY."); }
        } 
        else if (type === 'Poz' && state === S.REQ) { state = S.PERM; msg("POZWOLENIE."); }
        else if (type === 'Wyj' && state === S.PERM) { 
            szUsedForExit = false; state = S.PAUSE; setSig(dir, 'Wy', 'green'); setupTrain(); msg("WYJAZD."); 
        }
        else if (type === 'Wj' && state === S.ENTRY) { 
            szUsedForEntry = false; state = S.IN; setSig(st, 'Wj', 'green'); msg("WJAZD."); 
        }
        else if (type === 'Blk' && state === S.ARR) resetSystem();
        updateVisuals();
    }

    function emergency(type, st) {
        saveState();
        increment(type, st);
        if (type === 'dPo') { 
            dPoUsed = true;
            if (state === S.STUCK_DPO) { state = S.PWL; msg("dPo ODNOTOWANE. WZNAWIAM JAZDĘ."); resumeTrain(); }
            else { if (state === S.IDLE) dir = st; msg("DORAŹNY POCZĄTKOWY."); }
        } 
        else if (type === 'dKo') { dKoActive[st] = true; msg("DORAŹNE ZWALNIANIE."); }
        updateVisuals();
    }

    function setSig(st, ty, c) {
        const idR = `L_${ty}${st}_R`, idG = `L_${ty}${st}_G`, idW = `L_${ty}${st}_W`;
        if(!document.getElementById(idR)) return;
        document.getElementById(idR).className = 'light' + (c === 'red' ? ' red' : '');
        document.getElementById(idG).className = 'light' + (c === 'green' ? ' green' : '');
        document.getElementById(idW).className = 'light' + (c === 'white-blink' ? ' white blink' : '');
    }

    function setupTrain() {
        const t = document.getElementById('train'); t.style.display = 'block';
        t.style.left = (dir === 'A' ? '12px' : 'calc(100% - 60px)');
    }

    function resumeTrain() {
        if (state === S.EMERG_SZ_OUT || state === S.PAUSE || state === S.STUCK_DPO) {
            state = S.PWL; // Moment ruszenia - blokada strzałek na czerwono
            updateVisuals();
        }
        document.getElementById('btn-go').style.display = 'none';
        const t = document.getElementById('train');
        if (moveInterval) clearInterval(moveInterval);
        
        moveInterval = setInterval(() => {
            let currentLeft = t.style.left;
            let posPct = currentLeft.includes('calc') ? 90 : parseFloat(currentLeft);
            
            if (state === S.PWL && szUsedForExit && !dPoUsed) {
                let stopPoint = dir === 'A' ? 33 : 67;
                if ((dir === 'A' && posPct >= stopPoint) || (dir === 'B' && posPct <= stopPoint)) {
                    clearInterval(moveInterval); state = S.STUCK_DPO; msg("STOP! UŻYJ dPo."); updateVisuals(); return;
                }
            }

            posPct += (dir === 'A' ? 0.7 : -0.7);
            t.style.left = posPct + '%';
            
            if (state === S.PWL && ((dir === 'A' && posPct > 20) || (dir === 'B' && posPct < 80))) {
                state = S.LINE; setSig(dir, 'Wy', 'red'); msg("POCIĄG NA SZLAKU."); updateVisuals(); 
            }
            if (state === S.LINE && ((dir === 'A' && posPct >= 80) || (dir === 'B' && posPct <= 20))) {
                state = S.ENTRY; updateVisuals(); clearInterval(moveInterval);
            }
            if (state === S.IN && ((dir === 'A' && posPct > 94) || (dir === 'B' && posPct < 4))) {
                clearInterval(moveInterval); t.style.display = 'none'; state = S.ARR;
                setSig((dir === 'A' ? 'B' : 'A'), 'Wj', 'red');
                msg(szUsedForEntry && !dKoActive[dir==='A'?'B':'A'] ? "UWAGA! BRAK dKo." : "POCIĄG PRZYJECHAŁ.");
                updateVisuals();
            }
        }, 50);
    }

    function resetSystem() {
        if(moveInterval) clearInterval(moveInterval);
        state = S.IDLE; dir = null; dKoActive = { A: false, B: false }; prevState = S.IDLE;
        szUsedForEntry = false; szUsedForExit = false; dPoUsed = false;
        history = []; document.getElementById('btn-undo').disabled = true;
        document.querySelectorAll('.light').forEach(l => l.className = 'light');
        document.querySelectorAll('.light[id*="_R"]').forEach(l => l.className = 'light red');
        document.getElementById('train').style.display = 'none';
        msg("SYSTEM GOTOWY."); updateVisuals();
    }
    window.onload = resetSystem;
</script>
</body>
</html>
